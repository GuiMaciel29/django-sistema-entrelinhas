<!DOCTYPE html>
<html>
<head>
    <title>Pedidos</title>
</head>
<body>

<h1>Lista de Pedidos</h1>

<table border="1">
    <tr>
        <th>Cliente</th>
        <th>Produto</th>
        <th>Quantidade</th>
        <th>Data</th>
    </tr>

    {% for pedido in pedidos %}
    <tr>
        <td>{{ pedido.cliente }}</td>
        <td>{{ pedido.produto }}</td>
        <td>{{ pedido.quantidade }}</td>
        <td>{{ pedido.data_pedido }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
