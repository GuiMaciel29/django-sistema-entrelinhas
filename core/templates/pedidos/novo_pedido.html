{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Pedido</title>
    <link rel="stylesheet" href="{% static 'css/novo_pedido.css' %}">
</head>
<body>

<div class="container">
<div class="card">

    <div class="topo">
        <h1>Novo Pedido</h1>
        <p>Cadastre um novo serviço da gráfica</p>
    </div>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <div class="form-group">
            <label>Nome do Cliente</label>
            <input type="text" name="cliente" placeholder="Digite o nome do cliente" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Telefone</label>
                <input type="text" name="telefone" placeholder="(87) 99999-9999">
            </div>
            <div class="form-group">
                <label>Serviço</label>
                <input type="text" name="servico" placeholder="Ex: Banner, Cartão, Camisa, Adesivo..." required>
            </div>
        </div>

        <div class="form-group">
            <label>Descrição do Pedido</label>
            <textarea name="descricao" rows="4" placeholder="Detalhes do pedido..."></textarea>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Valor Total (R$)</label>
                <input type="number" step="0.01" name="valor" required>
            </div>
            <div class="form-group">
                <label>Sinal Pago (R$)</label>
                <input type="number" step="0.01" name="sinal_pago" value="0">
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label>Data de Entrega</label>
                <input type="date" name="data_entrega" required>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="ORCAMENTO">Orçamento</option>
                    <option value="PRODUCAO">Em Produção</option>
                    <option value="PRONTO">Pronto</option>
                    <option value="ENTREGUE">Entregue</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Arte enviada pelo cliente</label>
            <input type="file" name="arte_cliente">
        </div>

        <div class="acoes">
            <button type="submit" class="btn btn-salvar">Salvar Pedido</button>
            <a href="{% url 'lista_pedidos' %}" class="btn btn-voltar">← Lista de Pedidos</a>
            <a href="{% url 'dashboard' %}" class="btn btn-dashboard">🏠 Dashboard</a>
        </div>

    </form>
</div>
</div>

</body>
</html>
