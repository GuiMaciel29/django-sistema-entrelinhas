{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Pedido</title>
    <link rel="stylesheet" href="{% static 'css/pedidos.css' %}">
</head>
<body>

<div class="container">

    <div class="card">

        <h1>Novo Pedido</h1>

        <form method="post" enctype="multipart/form-data">
             {% csrf_token %}

             <label>Cliente</label>
            <input type="text" name="cliente" required>

            <label>Telefone</label>
            <input type="text" name="telefone" required>

             <label>Serviço</label>
            <input type="text" name="servico" required>

            <label>Valor Total</label>
            <input type="number" step="0.01" name="valor" required>

            <label>Sinal Pago</label>
            <input type="number" step="0.01" name="sinal_pago">

            <label>Data de Entrega</label>
            <input type="date" name="data_entrega">

            <label>Status</label>
            <select name="status">
                <option value="ORCAMENTO">Orçamento</option>
                <option value="PRODUCAO">Produção</option>
                <option value="PRONTO">Pronto</option>
                <option value="ENTREGUE">Entregue</option>
            </select>

         <label>Arte do Cliente</label>
            <input type="file" name="arte_cliente">

                <button type="submit">
                    Salvar Pedido
                </button>
        </form>
    </div>

</div>

</body>
</html>
