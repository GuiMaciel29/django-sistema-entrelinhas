{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Pedidos</title>

    <link rel="stylesheet" href="{% static 'css/pedidos.css' %}">
</head>
<body>

<div class="container">

    <h1>Pedidos da Gráfica</h1>

    <a href="#" class="btn btn-novo">
        Novo Pedido
    </a>

    <div class="card">

        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Produto</th>
                    <th>Quantidade</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody>

                {% for pedido in pedidos %}
                <tr>
                    <td>{{ pedido.cliente }}</td>
                    <td>{{ pedido.produto }}</td>
                    <td>{{ pedido.quantidade }}</td>

                    <td>
                        <span class="status status-producao">
                            Em Produção
                        </span>
                    </td>

                    <td>
                        <a href="#" class="btn btn-editar">
                            Editar
                        </a>

                        <a href="#" class="btn btn-excluir">
                            Excluir
                        </a>
                    </td>
                </tr>
                {% endfor %}

            </tbody>
        </table>

    </div>

</div>

</body>
</html>
