<h1>Novo Material</h1>

<form method="POST">

    {% csrf_token %}

    <input
        type="text"
        name="nome"
        placeholder="Nome"
    >

    <input
        type="number"
        name="quantidade"
        placeholder="Quantidade"
    >

    <input
        type="number"
        name="estoque_minimo"
        placeholder="Estoque mínimo"
    >

    <input
        type="number"
        step="0.01"
        name="custo_unitario"
        placeholder="Custo"
    >

    <button type="submit">
        Salvar
    </button>

</form>
