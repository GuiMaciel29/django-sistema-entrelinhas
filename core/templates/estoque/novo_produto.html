{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Material</title>

    <link rel="stylesheet" href="{% static 'css/novo_produto.css' %}">
</head>
<body>

<div class="container">

    <div class="card">

        <div class="cabecalho">
            <h1>📦 Novo Material</h1>
            <p>Cadastre um novo item no estoque</p>
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Nome do Material</label>
                <input
                    type="text"
                    name="nome"
                    placeholder="Ex: Papel Couchê 250g"
                    required
                >
            </div>

            <div class="row">

                <div class="form-group">
                    <label>Quantidade Atual</label>
                    <input
                        type="number"
                        name="quantidade"
                        min="0"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Estoque Mínimo</label>
                    <input
                        type="number"
                        name="estoque_minimo"
                        min="0"
                        required
                    >
                </div>

            </div>

            <div class="form-group">
                <label>Custo Unitário (R$)</label>
                <input
                    type="number"
                    step="0.01"
                    name="custo_unitario"
                    placeholder="0.00"
                    required
                >
            </div>

            <div class="info">

                <div class="info-card">
                    <strong>Dica:</strong>
                    Cadastre materiais como papel, tinta, lona, adesivo,
                    camisetas, canecas e outros insumos da gráfica.
                </div>

            </div>

            <div class="acoes">

                <button type="submit" class="btn-salvar">
                    Salvar Material
                </button>

                <a href="{% url 'estoque' %}" class="btn-voltar">
                    Voltar
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
