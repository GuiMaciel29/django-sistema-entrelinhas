{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Receita</title>

    <link rel="stylesheet" href="{% static 'css/nova_receita.css' %}">
</head>
<body>

<div class="container">

    <div class="card">

        <div class="cabecalho">
            <h1>💰 Nova Receita</h1>
            <p>Cadastre uma nova entrada financeira</p>
        </div>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Descrição</label>
                <input
                    type="text"
                    name="descricao"
                    placeholder="Ex: Pagamento de cartões de visita"
                    required
                >
            </div>

            <div class="row">

                <div class="form-group">
                    <label>Cliente</label>
                    <input
                        type="text"
                        name="cliente"
                        placeholder="Nome do cliente"
                    >
                </div>

                <div class="form-group">
                    <label>Valor (R$)</label>
                    <input
                        type="number"
                        step="0.01"
                        name="valor"
                        required
                    >
                </div>

            </div>

            <div class="row">

                <div class="form-group">
                    <label>Data</label>
                    <input
                        type="date"
                        name="data"
                        required
                    >
                </div>

            </div>

            <div class="acoes">

                <button type="submit" class="btn-salvar">
                    Salvar Receita
                </button>

                <a href="{% url 'receitas' %}" class="btn-voltar">
                    Voltar
                </a>

            </div>

        </form>

    </div>

</div>

</body>
</html>
